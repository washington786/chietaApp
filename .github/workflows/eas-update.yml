name: EAS Update (OTA)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Update channel to publish to"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
      message:
        description: "Update message (shown in Expo dashboard)"
        required: true
        default: "Manual OTA update"

permissions:
  contents: read

concurrency:
  group: eas-update-${{ github.event.inputs.channel }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish OTA update → ${{ github.event.inputs.channel }}
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        run: |
          eas update \
            --channel "${{ github.event.inputs.channel }}" \
            --message "${{ github.event.inputs.message }}" \
            --non-interactive

      - name: Summary
        run: |
          echo "##EAS Update published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Channel | \`${{ github.event.inputs.channel }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Message | ${{ github.event.inputs.message }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View updates: https://expo.dev/accounts/washington786/projects/Chieta/updates" >> $GITHUB_STEP_SUMMARY

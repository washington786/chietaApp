name: Preview build (TestFlight + APK)

on:
  workflow_dispatch:
    inputs:
      build-profile:
        description: "EAS build profile (default: preview)"
        required: false
        default: "preview"

permissions:
  contents: read

concurrency:
  group: preview-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_PROFILE: ${{ github.event.inputs.build-profile || 'preview' }}

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

  setup-eas:
    name: Ensure EAS channel exists
    needs: test
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create EAS update channel (idempotent)
        run: |
          set +e
          OUTPUT=$(eas channel:create "$BUILD_PROFILE" 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ] && ! echo "$OUTPUT" | grep -qi "already exists"; then
            echo "::error::Failed to create EAS channel '$BUILD_PROFILE'"
            exit $EXIT_CODE
          fi
          echo "✓ EAS channel '$BUILD_PROFILE' is ready"

  build-ios:
    name: Build & submit iOS to TestFlight
    needs: setup-eas
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          if [ -z "$APP_STORE_CONNECT_API_KEY" ]; then
            echo "::error::APP_STORE_CONNECT_API_KEY secret is required"
            exit 1
          fi
          printf '%s' "$APP_STORE_CONNECT_API_KEY" > asc-api-key.p8

      - name: Build iOS preview artifact
        run: |
          eas build \
            --platform ios \
            --profile "$BUILD_PROFILE" \
            --non-interactive \
            --wait

      - name: Submit iOS build to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ISSUER_ID }}
        run: |
          if [ -z "$APP_STORE_CONNECT_KEY_ID" ] || [ -z "$APP_STORE_CONNECT_KEY_ISSUER_ID" ]; then
            echo "::error::APP_STORE_CONNECT_KEY_ID and APP_STORE_CONNECT_KEY_ISSUER_ID secrets are required"
            exit 1
          fi
          eas submit \
            --platform ios \
            --profile "$BUILD_PROFILE" \
            --non-interactive \
            --latest \
            --asc-app-identifier com.danielkarabo.Chieta \
            --asc-api-key-id "$APP_STORE_CONNECT_KEY_ID" \
            --asc-api-key-issuer-id "$APP_STORE_CONNECT_KEY_ISSUER_ID" \
            --asc-api-key-path ./asc-api-key.p8

      - name: Clean up credential files
        if: always()
        run: rm -f asc-api-key.p8

  build-android:
    name: Build Android APK (no store submission)
    needs: setup-eas
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: |
          eas build \
            --platform android \
            --profile "$BUILD_PROFILE" \
            --non-interactive \
            --wait

      - name: Print APK download link
        run: |
          echo "##[notice]📦 Android APK build complete."
          echo "Download the APK from: https://expo.dev/accounts/washington786/projects/chietaApp/builds"
          echo "Share the APK link with testers — they must enable 'Install unknown apps' on their device."


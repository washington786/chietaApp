name: Deploy mobile apps

# DISABLED: Auto-deployment is disabled. Deploy manually with EAS CLI.
# To re-enable, restore the original `on:` triggers:
#   push:
#     branches: [main, release/**]
#     paths: [App.tsx, app.json, eas.json, package.json, package-lock.json, src/**, assets/**]
#   workflow_dispatch:
#     inputs:
#       build-profile:
#         description: "EAS build profile to use (default: production)"
#         required: false
#         default: "production"
on:
  workflow_dispatch:
    inputs:
      _note:
        description: "Disabled — deploy manually: eas build && eas submit"
        required: false

permissions:
  contents: read

jobs:
  disabled:
    name: Workflow disabled
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "Store deployment is disabled in CI."
          echo "Deploy manually using EAS CLI:"
          echo "  eas build --platform android --profile production"
          echo "  eas build --platform ios --profile production"
          echo "  eas submit --platform android --profile production"
          echo "  eas submit --platform ios --profile production"
